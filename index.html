// ─── PREDICTION ENGINE ────────────────────────────────────────────────────────

function factorial(n) {
  if (n <= 1) return 1;
  return n * factorial(n - 1);
}

function poissonProb(lambda, k) {
  if (lambda <= 0) return k === 0 ? 1 : 0;
  return (Math.exp(-lambda) * Math.pow(lambda, k)) / factorial(k);
}

function generateScorelinesFromPoisson(homeLambda, awayLambda) {
  const scorelines = [];
  for (let i = 0; i <= 5; i++) {
    for (let j = 0; j <= 5; j++) {
      const prob = poissonProb(homeLambda, i) * poissonProb(awayLambda, j);
      scorelines.push({ score: `${i}-${j}`, prob: parseFloat(prob.toFixed(4)) });
    }
  }
  return scorelines.sort((a, b) => b.prob - a.prob).slice(0, 10);
}

function generatePrediction(homeTeamName, awayTeamName, injuredTeam = null) {
  const home = teams2026[homeTeamName];
  const away = teams2026[awayTeamName];

  const eloDiff = home.elo - away.elo;
  const rawWinProb = 1 / (1 + Math.pow(10, -eloDiff / 400));

  let formAdjustment = (home.form - away.form) * 0.1;
  const homeAdvantage = 0.04;

  let winProb = Math.min(0.85, Math.max(0.08, rawWinProb + formAdjustment + homeAdvantage));
  let lossProb = Math.min(0.85, Math.max(0.08, (1 - rawWinProb) - formAdjustment + homeAdvantage * 0.3));
  let drawProb = Math.max(0.05, 1 - winProb - lossProb);

  const total = winProb + drawProb + lossProb;
  winProb /= total; drawProb /= total; lossProb /= total;

  // Injury simulation
  let injuryNote = null;
  let injuryPenalty = 1.0;
  if (injuredTeam === homeTeamName) {
    injuryPenalty = 0.82;
    injuryNote = `Key player injury reduces ${homeTeamName}'s attack by ~18%`;
  } else if (injuredTeam === awayTeamName) {
    injuryPenalty = 0.82;
    injuryNote = `Key player injury reduces ${awayTeamName}'s attack by ~18%`;
  }

  const baseXG = 1.1 + (home.elo / 800);
  const awayBaseXG = 1.1 + (away.elo / 800);
  const homeXG = (baseXG + (home.form - away.form) * 0.6) * (injuredTeam === homeTeamName ? injuryPenalty : 1.0);
  const awayXG = (awayBaseXG + (away.form - home.form) * 0.6) * (injuredTeam === awayTeamName ? injuryPenalty : 1.0);
  const totalXG = parseFloat((homeXG + awayXG).toFixed(2));
  const h1Goals = parseFloat((totalXG * 0.42).toFixed(2));
  const h2Goals = parseFloat((totalXG - h1Goals).toFixed(2));

  const scorelines = generateScorelinesFromPoisson(
    Math.max(0.3, homeXG),
    Math.max(0.3, awayXG)
  );

  const confVal = Math.abs(winProb - lossProb);
  const confidence = confVal > 0.25 ? 'high' : confVal > 0.12 ? 'medium' : 'low';

  return {
    winProb: parseFloat(winProb.toFixed(3)),
    drawProb: parseFloat(drawProb.toFixed(3)),
    lossProb: parseFloat(lossProb.toFixed(3)),
    expectedGoals: totalXG,
    homeXG: parseFloat(homeXG.toFixed(2)),
    awayXG: parseFloat(awayXG.toFixed(2)),
    h1Goals,
    h2Goals,
    scorelines,
    confidence,
    injuryNote,
  };
}

  projectedR16.forEach(m => {

  // Quarter-finals
  const qf = [

    { date: '2026-07-19', home: 'Brazil', away: 'England', id: id++ },

  ];
  qf.forEach(m => {
    matches.push({ ...m, stage: 'Quarter-Final', group: null, prediction: generatePrediction(m.home, m.away) });
  });

  // Semi-finals
  const sf = [
    { date: '2026-07-26', home: 'Argentina', away: 'Brazil', id: id++ },
    { date: '2026-07-27', home: 'Spain', away: 'Portugal', id: id++ },
  ];
  sf.forEach(m => {
    matches.push({ ...m, stage: 'Semi-Final', group: null, prediction: generatePrediction(m.home, m.away) });
  });

  // Final
  matches.push({
    id: id++,
    date: '2026-08-03',
    stage: 'Final',
    group: null,

}

function confidenceColor(c) {
  if (c === 'high')   return 'text-emerald-600 bg-emerald-50 border-emerald-200';
  if (c === 'medium') return 'text-amber-600 bg-amber-50 border-amber-200';
  return 'text-red-500 bg-red-50 border-red-200';
}

function confidenceDot(c) {
  if (c === 'high')   return '🟢';
  if (c === 'medium') return '🟡';
  return '🔴';
}

function stageOrder(s) {
  const o = { 'Group': 0, 'Round of 16': 1, 'Quarter-Final': 2, 'Semi-Final': 3, 'Final': 4 };
  return o[s] ?? 99;
}

function exportCSV(matches) {
  const header = ['ID','Date','Stage','Group','Home Team','Away Team','Win%','Draw%','Loss%','xG','Confidence'];
  const rows = matches.map(m => [
    m.id, m.date, m.stage, m.group || '', m.homeTeam, m.awayTeam,
    (m.prediction.winProb * 100).toFixed(1),
    (m.prediction.drawProb * 100).toFixed(1),
    (m.prediction.lossProb * 100).toFixed(1),
    m.prediction.expectedGoals,
    m.prediction.confidence,
  ]);
  const csv = [header, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'world-cup-2026-predictions.csv'; a.click();
  URL.revokeObjectURL(url);
}

                onClick={() => setInjuredTeam(injuredTeam === match.awayTeam ? null : match.awayTeam)}
                className={`px-3 py-1.5 rounded-lg text-sm font-medium border transition-all ${injuredTeam === match.awayTeam ? 'bg-red-50 border-red-400 text-red-700' : 'bg-gray-50 border-gray-200 text-gray-600 hover:border-red-300'}`}
              >
                {away.flag} {match.awayTeam} injury
              </button>
              {injuredTeam && (
                <button onClick={() => setInjuredTeam(null)} className="px-3 py-1.5 rounded-lg text-sm text-gray-400 hover:text-gray-600">
                  Clear
                </button>
              )}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function FixturesTab({ matches, injuredTeam, setInjuredTeam }) {
  const [search, setSearch] = useState('');
  const [confFilter, setConfFilter] = useState('all');
  const [stageFilter, setStageFilter] = useState('all');
  const [selectedMatch, setSelectedMatch] = useState(null);
  const [localInjured, setLocalInjured] = useState(null);

  const stages = ['all', 'Group', 'Round of 16', 'Quarter-Final', 'Semi-Final', 'Final'];

  const filtered = useMemo(() => matches.filter(m => {
    const q = search.toLowerCase();
    const matchSearch = !q || m.homeTeam.toLowerCase().includes(q) || m.awayTeam.toLowerCase().includes(q);
    const matchConf = confFilter === 'all' || m.prediction.confidence === confFilter;
    const matchStage = stageFilter === 'all' || m.stage === stageFilter;
    return matchSearch && matchConf && matchStage;
  }), [matches, search, confFilter, stageFilter]);

  const handleMatchClick = (m) => {
    setSelectedMatch(m);
    setLocalInjured(null);
  };

  const displayMatch = useMemo(() => {
    if (!selectedMatch) return null;
    if (!localInjured) return selectedMatch;
    return { ...selectedMatch, prediction: generatePrediction(selectedMatch.homeTeam, selectedMatch.awayTeam, localInjured) };
  }, [selectedMatch, localInjured]);

  return (
    <div>
      {/* Filters */}
      <div className="bg-white border-b border-gray-100 p-4 space-y-3 sticky top-0 z-10">
        <div className="relative">
          <span className="absolute left-3 top-2.5 text-gray-400">🔍</span>
          <input
            type="text"
            placeholder="Search teams..."
            value={search}
            onChange={e => setSearch(e.target.value)}
            className="w-full pl-9 pr-4 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
          />
        </div>
        <div className="flex gap-2 flex-wrap">
          {['all','high','medium','low'].map(c => (
            <button
              key={c}
              onClick={() => setConfFilter(c)}
              className={`px-3 py-1 rounded-full text-xs font-medium border transition-all ${confFilter === c ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600 border-gray-200 hover:border-blue-300'}`}
            >
              {c === 'all' ? 'All' : `${confidenceDot(c)} ${c}`}
            </button>
          ))}
          <div className="border-l border-gray-200 mx-1" />
          {stages.map(s => (
            <button
              key={s}
              onClick={() => setStageFilter(s)}
              className={`px-3 py-1 rounded-full text-xs font-medium border transition-all ${stageFilter === s ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-gray-600 border-gray-200 hover:border-indigo-300'}`}
            >
              {s === 'all' ? 'All Stages' : s}
            </button>
          ))}
        </div>
      </div>

      {/* Results count */}
      <div className="px-4 py-2 text-sm text-gray-500">
        {filtered.length} match{filtered.length !== 1 ? 'es' : ''} found
      </div>

      {/* Match list */}
      <div className="p-4 grid gap-3 sm:grid-cols-2 lg:grid-cols-3">
        {filtered.length === 0 && (
          <div className="col-span-3 text-center py-16 text-gray-400">
            <div className="text-4xl mb-2">⚽</div>
            <p>No matches found</p>
          </div>
        )}
        {filtered.map(m => (
          <MatchCard key={m.id} match={m} onClick={() => handleMatchClick(m)} injuredTeam={localInjured} />
        ))}
      </div>

      {displayMatch && (
        <MatchDetailPanel
          match={displayMatch}
          onClose={() => setSelectedMatch(null)}
          injuredTeam={localInjured}
          setInjuredTeam={(t) => {
            setLocalInjured(t);
          }}
        />
      )}
    </div>
  );
}

function BracketTab({ matches }) {
  const [selectedMatch, setSelectedMatch] = useState(null);
  const [localInjured, setLocalInjured] = useState(null);

  const byStage = {
    r16: matches.filter(m => m.stage === 'Round of 16'),
    qf:  matches.filter(m => m.stage === 'Quarter-Final'),
    sf:  matches.filter(m => m.stage === 'Semi-Final'),
    f:   matches.filter(m => m.stage === 'Final'),
  };

  const displayMatch = useMemo(() => {
    if (!selectedMatch) return null;
    if (!localInjured) return selectedMatch;
    return { ...selectedMatch, prediction: generatePrediction(selectedMatch.homeTeam, selectedMatch.awayTeam, localInjured) };
  }, [selectedMatch, localInjured]);

  function MiniCard({ m }) {
    const pred = m.prediction;
    const home = teams2026[m.homeTeam];
    const away = teams2026[m.awayTeam];
    const winner = pred.winProb > pred.lossProb ? m.homeTeam : m.awayTeam;
    const winnerFlag = pred.winProb > pred.lossProb ? home.flag : away.flag;

    return (
      <div
        onClick={() => { setSelectedMatch(m); setLocalInjured(null); }}
        className="bg-white border border-gray-200 rounded-lg p-2 cursor-pointer hover:border-blue-400 hover:shadow-md transition-all text-xs w-40"
      >
        <div className="flex justify-between items-center mb-1">
          <span className="text-gray-400">{m.date.slice(5)}</span>
          <span>{confidenceDot(pred.confidence)}</span>
        </div>
        <div className={`flex justify-between items-center py-0.5 ${pred.winProb > pred.lossProb ? 'font-bold text-blue-700' : 'text-gray-600'}`}>
          <span>{home.flag} {m.homeTeam.split(' ')[0]}</span>
          <span className="font-mono text-xs">{(pred.winProb*100).toFixed(0)}%</span>
        </div>
        <div className="w-full bg-gray-100 h-1 rounded my-1">
          <div className="h-1 rounded bg-blue-400" style={{ width: `${pred.winProb*100}%` }} />
        </div>
        <div className={`flex justify-between items-center py-0.5 ${pred.lossProb > pred.winProb ? 'font-bold text-amber-600' : 'text-gray-600'}`}>
          <span>{away.flag} {m.awayTeam.split(' ')[0]}</span>
          <span className="font-mono text-xs">{(pred.lossProb*100).toFixed(0)}%</span>
        </div>
        <div className="mt-1 pt-1 border-t border-dashed border-gray-100 text-center text-gray-400">
          Likely: {winnerFlag} {winner.split(' ')[0]}
        </div>
      </div>
    );
  }

  function StageColumn({ title, matchList, color }) {
    return (
      <div className="flex flex-col items-center gap-4">
        <div className={`text-xs font-bold uppercase tracking-widest px-3 py-1 rounded-full ${color}`}>{title}</div>
        <div className="flex flex-col gap-4">
          {matchList.map(m => <MiniCard key={m.id} m={m} />)}
        </div>
      </div>
    );
  }

  // Most likely champion
  const finalMatch = byStage.f[0];
  const champion = finalMatch
    ? (finalMatch.prediction.winProb > finalMatch.prediction.lossProb ? finalMatch.homeTeam : finalMatch.awayTeam)
    : null;

  return (
    <div className="p-4">
      {champion && (
        <div className="bg-gradient-to-r from-yellow-400 to-amber-500 text-white rounded-2xl p-4 mb-6 text-center shadow-lg">
          <div className="text-3xl mb-1">{teams2026[champion].flag} 🏆</div>
          <div className="text-xl font-bold">Predicted Champion: {champion}</div>
          <div className="text-sm opacity-80 mt-1">
            {(finalMatch.prediction.winProb > finalMatch.prediction.lossProb
              ? finalMatch.prediction.winProb
              : finalMatch.prediction.lossProb * 100 / 100 * 100).toFixed(1)}% win probability in the Final
          </div>
        </div>
      )}

      <div className="overflow-x-auto pb-4">
        <div className="flex gap-8 min-w-max items-start justify-center">
          <StageColumn title="Round of 16" matchList={byStage.r16.slice(0,4)} color="bg-blue-50 text-blue-700" />
          <StageColumn title="Quarter-Finals" matchList={byStage.qf.slice(0,2)} color="bg-indigo-50 text-indigo-700" />
          <StageColumn title="Semi-Finals" matchList={byStage.sf.slice(0,1)} color="bg-purple-50 text-purple-700" />
          <StageColumn title="Final" matchList={byStage.f} color="bg-yellow-50 text-yellow-700" />
          <StageColumn title="Semi-Finals" matchList={byStage.sf.slice(1)} color="bg-purple-50 text-purple-700" />
          <StageColumn title="Quarter-Finals" matchList={byStage.qf.slice(2)} color="bg-indigo-50 text-indigo-700" />
          <StageColumn title="Round of 16" matchList={byStage.r16.slice(4)} color="bg-blue-50 text-blue-700" />
        </div>
      </div>

      {displayMatch && (
        <MatchDetailPanel
          match={displayMatch}
          onClose={() => setSelectedMatch(null)}
          injuredTeam={localInjured}
          setInjuredTeam={setLocalInjured}
        />
      )}
    </div>
  );
}

function TeamStatsTab({ matches }) {
  const [sortBy, setSortBy] = useState('elo');
  const [sortDir, setSortDir] = useState('desc');

  const teamStats = useMemo(() => {
    const stats = {};
    Object.entries(teams2026).forEach(([name, data]) => {
      const teamMatches = matches.filter(m => m.homeTeam === name || m.awayTeam === name);
      const wins = teamMatches.filter(m => {
        const isHome = m.homeTeam === name;
        return isHome ? m.prediction.winProb > 0.45 : m.prediction.lossProb > 0.45;
      }).length;
      const totalXG = teamMatches.reduce((sum, m) => {
        return sum + (m.homeTeam === name ? m.prediction.homeXG : m.prediction.awayXG);
      }, 0);
      stats[name] = {
        name, flag: data.flag, group: data.group,
        elo: data.elo, form: data.form,
        marketValue: data.marketValue,
        continent: data.continent,
        winPct: teamMatches.length ? wins / teamMatches.length : 0,
        avgXG: teamMatches.length ? (totalXG / teamMatches.length).toFixed(2) : 0,
        matches: teamMatches.length,
      };
    });
    return Object.values(stats);
  }, [matches]);

  const sorted = useMemo(() => {
    return [...teamStats].sort((a, b) => {
      const av = a[sortBy], bv = b[sortBy];
      return sortDir === 'desc' ? bv - av : av - bv;
    });
  }, [teamStats, sortBy, sortDir]);

  function SortBtn({ col, label }) {
    const active = sortBy === col;
    return (
      <button
        onClick={() => { if (active) setSortDir(d => d === 'desc' ? 'asc' : 'desc'); else { setSortBy(col); setSortDir('desc'); } }}
        className={`text-left text-xs font-semibold uppercase tracking-wider ${active ? 'text-blue-600' : 'text-gray-500 hover:text-gray-700'}`}
      >
        {label} {active ? (sortDir === 'desc' ? '↓' : '↑') : ''}
      </button>
    );
  }

  function eloColor(elo) {
    if (elo >= 1700) return 'text-emerald-600 font-bold';
    if (elo >= 1600) return 'text-blue-600 font-semibold';
    if (elo >= 1500) return 'text-gray-700';
    return 'text-gray-400';
  }

  return (
    <div className="p-4">
      <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div className="p-4 border-b border-gray-100">
          <h2 className="font-bold text-gray-800 text-lg">Team Strength Rankings</h2>
          <p className="text-sm text-gray-500 mt-0.5">32 teams · Click column headers to sort</p>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-gray-50 border-b border-gray-100">
              <tr>
                <th className="px-4 py-3 text-left text-xs text-gray-400 w-8">#</th>
                <th className="px-4 py-3 text-left"><SortBtn col="name" label="Team" /></th>
                <th className="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider text-gray-500">Group</th>
                <th className="px-4 py-3 text-right"><SortBtn col="elo" label="ELO" /></th>
                <th className="px-4 py-3 text-right"><SortBtn col="form" label="Form" /></th>
                <th className="px-4 py-3 text-right"><SortBtn col="marketValue" label="Value (€M)" /></th>
                <th className="px-4 py-3 text-right"><SortBtn col="winPct" label="Win%" /></th>
                <th className="px-4 py-3 text-right"><SortBtn col="avgXG" label="Avg xG" /></th>
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-50">
              {sorted.map((t, i) => (
                <tr key={t.name} className="hover:bg-blue-50 transition-colors">
                  <td className="px-4 py-3 text-gray-400 font-mono text-xs">{i + 1}</td>
                  <td className="px-4 py-3">
                    <div className="flex items-center gap-2">
                      <span className="text-xl">{t.flag}</span>
                      <div>
                        <div className="font-semibold text-gray-900">{t.name}</div>
                        <div className="text-xs text-gray-400">{t.continent}</div>
                      </div>
                    </div>
                  </td>
                  <td className="px-4 py-3">
                    <span className="bg-blue-50 text-blue-700 text-xs font-bold px-2 py-0.5 rounded">{t.group}</span>
                  </td>
                  <td className={`px-4 py-3 text-right font-mono ${eloColor(t.elo)}`}>{t.elo}</td>
                  <td className="px-4 py-3 text-right">
                    <div className="flex items-center justify-end gap-1">
                      <div className="w-12 bg-gray-100 rounded-full h-1.5">
                        <div className="h-1.5 rounded-full bg-emerald-400" style={{ width: `${t.form * 100}%` }} />
                      </div>
                      <span className="font-mono text-gray-600 text-xs">{(t.form * 100).toFixed(0)}%</span>
                    </div>
                  </td>
                  <td className="px-4 py-3 text-right font-mono text-gray-700">{t.marketValue}</td>
                  <td className="px-4 py-3 text-right font-mono">
                    <span className={t.winPct > 0.5 ? 'text-emerald-600 font-bold' : t.winPct > 0.35 ? 'text-blue-600' : 'text-gray-500'}>
                      {(t.winPct * 100).toFixed(0)}%
                    </span>
                  </td>
                  <td className="px-4 py-3 text-right font-mono text-gray-600">{t.avgXG}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

                <td className="px-4 py-2 font-semibold text-gray-700">{h.match}</td>
                <td className="px-4 py-2 text-gray-600 text-xs">{h.predicted}</td>
                <td className="px-4 py-2 text-gray-600 text-xs">{h.actual}</td>
                <td className="px-4 py-2 text-center">
                  {h.correct
                    ? <span className="text-emerald-600 font-bold">✓</span>
                    : <span className="text-red-400 font-bold">✗</span>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        <div className="p-3 bg-gray-50 text-center text-sm text-gray-500">
          Sample accuracy: <span className="font-bold text-blue-600">{historicalData.filter(h => h.correct).length}/{historicalData.length}</span>
          {' '}({((historicalData.filter(h => h.correct).length / historicalData.length) * 100).toFixed(0)}%) — consistent with model validation
        </div>
      </div>

      {/* Interpretation guide */}
      <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 text-sm text-amber-800">
        <h4 className="font-bold mb-2">📊 How to interpret predictions</h4>
        <ul className="space-y-1 text-xs">
          <li>• <strong>Win probability</strong> is the model's confidence the home team wins in 90 minutes</li>
          <li>• <strong>xG (Expected Goals)</strong> is the statistical measure of chance quality created</li>
          <li>• <strong>High confidence</strong> (🟢) means win-loss gap &gt; 25 percentage points</li>
          <li>• <strong>Scorelines</strong> use Poisson distribution with team-specific attack/defense rates</li>
          <li>• Football is inherently unpredictable — treat these as probabilities, not certainties</li>
        </ul>
      </div>
    </div>
  );
}
